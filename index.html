<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CraftVerse — Free Fire Craftland Maps</title>
<meta name="description" content="Discover, share and copy the best Free Fire Craftland map codes." />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bgdeep: "#0A0E17",
          panel: "#141B2C",
          panelalt: "#1C2540",
          panelhover: "#212B4A",
          bd: "#232D48",
          tprimary: "#F3F5F9",
          tmuted: "#8A93AC",
          tfaint: "#5C6580",
          accent: "#3E8EFF",
          accent2: "#7C5CFF",
          coral: "#FF5D6C",
          success: "#34D399",
          warn: "#FBBF24",
        },
        fontFamily: {
          sora: ["Sora", "sans-serif"],
          inter: ["Inter", "sans-serif"],
          mono: ['"JetBrains Mono"', "monospace"],
        },
      },
    },
  };
</script>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-bgdeep text-tprimary font-inter min-h-screen">
  <div id="app" class="max-w-[480px] mx-auto min-h-screen relative flex flex-col">
    <div style="padding:24px;font-family:sans-serif;color:#8A93AC;font-size:13px;">Loading CraftVerse…</div>
  </div>
  <script>
    function showBootError(msg, detail) {
      var app = document.getElementById("app");
      if (!app) return;
      app.innerHTML =
        '<div style="padding:24px;font-family:monospace;font-size:12px;color:#FF9B9B;background:#1a0e0e;min-height:100vh;white-space:pre-wrap;word-break:break-word;">' +
        '<div style="font-family:sans-serif;font-weight:700;font-size:15px;color:#fff;margin-bottom:10px;">⚠️ CraftVerse failed to load</div>' +
        '<div style="color:#FFD3D3;margin-bottom:10px;">' + String(msg).replace(/</g, "&lt;") + '</div>' +
        '<div style="opacity:.6;font-size:10px;">' + String(detail || "").replace(/</g, "&lt;") + '</div>' +
        '</div>';
    }
    window.addEventListener("error", function (e) {
      showBootError(e.message || "Unknown error", (e.filename ? e.filename + ":" + e.lineno : "") + (e.error && e.error.stack ? "\n" + e.error.stack : ""));
    });
    window.addEventListener("unhandledrejection", function (e) {
      showBootError((e.reason && e.reason.message) || String(e.reason), e.reason && e.reason.stack);
    });
  </script>
  <script type="module" src="app.js?v=10"></script>
</body>
</html>
